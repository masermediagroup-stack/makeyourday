<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vertical Line Wave Tool</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main aria-label="Interactive vertical line selector">
      <label class="line"><input type="radio" name="line-select" /><span class="num">01</span><span class="month" data-text="JANUARY"></span><span class="stem"></span><span class="wave"></span></label>
      <label class="line"><input type="radio" name="line-select" /><span class="num">02</span><span class="month" data-text="FEBRUARY"></span><span class="stem"></span><span class="wave"></span></label>
      <label class="line"><input type="radio" name="line-select" /><span class="num">03</span><span class="month" data-text="MARCH"></span><span class="stem"></span><span class="wave"></span></label>
      <label class="line"><input type="radio" name="line-select" /><span class="num">04</span><span class="month" data-text="APRIL"></span><span class="stem"></span><span class="wave"></span></label>
      <label class="line"><input type="radio" name="line-select" /><span class="num">05</span><span class="month" data-text="MAY"></span><span class="stem"></span><span class="wave"></span></label>
      <label class="line"><input type="radio" name="line-select" /><span class="num">06</span><span class="month" data-text="JUNE"></span><span class="stem"></span><span class="wave"></span></label>
      <label class="line"><input type="radio" name="line-select" /><span class="num">07</span><span class="month" data-text="JULY"></span><span class="stem"></span><span class="wave"></span></label>
      <label class="line"><input type="radio" name="line-select" /><span class="num">08</span><span class="month" data-text="AUGUST"></span><span class="stem"></span><span class="wave"></span></label>
      <label class="line"><input type="radio" name="line-select" /><span class="num">09</span><span class="month" data-text="SEPTEMBER"></span><span class="stem"></span><span class="wave"></span></label>
      <label class="line"><input type="radio" name="line-select" /><span class="num">10</span><span class="month" data-text="OCTOBER"></span><span class="stem"></span><span class="wave"></span></label>
      <label class="line"><input type="radio" name="line-select" /><span class="num">11</span><span class="month" data-text="NOVEMBER"></span><span class="stem"></span><span class="wave"></span></label>
      <label class="line"><input type="radio" name="line-select" /><span class="num">12</span><span class="month" data-text="DECEMBER"></span><span class="stem"></span><span class="wave"></span></label>
    </main>
    <script>
      const monthLengths = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
      const monthNames = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
      ];
      const monthShort = [
        "JAN",
        "FEB",
        "MAR",
        "APR",
        "MAY",
        "JUN",
        "JUL",
        "AUG",
        "SEP",
        "OCT",
        "NOV",
        "DEC",
      ];
      const weekdayNames = [
        "Sunday",
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday",
        "Saturday",
      ];
      const lines = [...document.querySelectorAll(".line")];
      const dayState = new WeakMap();
      const STORAGE_KEY = "minimal-brutal-calendar-events-v1";

      let eventStore = loadEventStore();
      let selectedLine = null;
      const panelState = {
        line: null,
        monthIndex: 0,
        day: 1,
        dateKey: "",
        mode: "menu",
        deleteMode: false,
        detailEventId: null,
        editEventId: null,
      };

      const transitionOverlay = document.createElement("div");
      transitionOverlay.className = "select-panel-overlay";
      transitionOverlay.innerHTML = `
        <div class="select-panel" role="dialog" aria-modal="true" aria-label="Calendar day details" aria-hidden="true">
          <section class="event-shell" aria-live="polite">
            <header class="event-head">
              <div class="event-date-number" data-date-number>01</div>
              <div class="event-date-meta">
                <p class="event-weekday" data-weekday>Monday</p>
                <p class="event-month" data-month>January</p>
              </div>
            </header>

            <div class="event-body">
              <div class="event-menu-view" data-menu-view>
                <button type="button" class="event-menu-card" data-menu-add>
                  <span class="event-menu-title">Add events</span>
                  <span class="event-menu-note">Create an event for this day.</span>
                </button>
                <button type="button" class="event-menu-card" data-menu-show>
                  <span class="event-menu-title">Show events</span>
                  <span class="event-menu-note">Browse saved events for this day.</span>
                </button>
                <button type="button" class="event-menu-card" data-menu-delete>
                  <span class="event-menu-title">Delete an event</span>
                  <span class="event-menu-note">Remove an event from this day.</span>
                </button>
              </div>
              <div class="event-list-view" data-list-view>
                <p class="event-description">What needs to be done today.</p>
                <ul class="event-list" data-event-list></ul>
                <p class="event-empty" data-empty-message>No events yet for this day.</p>
              </div>

              <article class="event-detail-view" data-detail-view hidden>
                <button class="event-back" type="button" data-back-list>&lt; Back to list</button>
                <h3 class="event-detail-title" data-detail-title></h3>
                <dl class="event-detail-grid">
                  <div><dt>Time</dt><dd data-detail-time></dd></div>
                  <div><dt>Location</dt><dd data-detail-location></dd></div>
                  <div class="event-detail-block"><dt>Description</dt><dd data-detail-description></dd></div>
                </dl>
              </article>
              <button class="event-menu-back" type="button" data-back-menu aria-label="Back to options" hidden>&larr;</button>
            </div>

            <form class="event-form" data-event-form hidden>
              <div class="event-head event-form-head">
                <div class="event-date-number" data-form-date-number>01</div>
                <div class="event-date-meta">
                  <p class="event-weekday" data-form-weekday>Monday</p>
                  <p class="event-month" data-form-month>January</p>
                </div>
              </div>
              <label><span>Title</span><input name="title" maxlength="60" required /></label>
              <label class="time-field">
                <span>Time</span>
                <div class="time-picker" data-time-picker>
                  <button type="button" class="time-wheel" data-time-wheel="hour" aria-label="Set hour">
                    <span class="time-wheel-track" data-time-hour-track></span>
                  </button>
                  <span class="time-sep">:</span>
                  <button type="button" class="time-wheel" data-time-wheel="minute" aria-label="Set minute">
                    <span class="time-wheel-track" data-time-minute-track></span>
                  </button>
                  <div class="ampm-toggle" data-ampm-toggle>
                    <button type="button" data-ampm="AM">AM</button>
                    <button type="button" data-ampm="PM">PM</button>
                  </div>
                </div>
                <input name="time" type="hidden" required />
              </label>
              <label><span>Location</span><input name="location" maxlength="64" required /></label>
              <label class="description-field"><span>Short description</span><textarea name="description" maxlength="180" required></textarea></label>
              <div class="event-form-actions">
                <button type="submit">Save</button>
                <button type="button" data-cancel-form>Cancel</button>
              </div>
            </form>
          </section>
        </div>`;
      document.body.append(transitionOverlay);

      const transitionPanel = transitionOverlay.querySelector(".select-panel");
      const eventShell = transitionOverlay.querySelector(".event-shell");
      const dateNumberNode = transitionOverlay.querySelector("[data-date-number]");
      const weekdayNode = transitionOverlay.querySelector("[data-weekday]");
      const monthNode = transitionOverlay.querySelector("[data-month]");
      const menuViewNode = transitionOverlay.querySelector("[data-menu-view]");
      const listViewNode = transitionOverlay.querySelector("[data-list-view]");
      const detailViewNode = transitionOverlay.querySelector("[data-detail-view]");
      const descriptionNode = transitionOverlay.querySelector(".event-description");
      const eventListNode = transitionOverlay.querySelector("[data-event-list]");
      const emptyNode = transitionOverlay.querySelector("[data-empty-message]");
      const menuAddBtn = transitionOverlay.querySelector("[data-menu-add]");
      const menuShowBtn = transitionOverlay.querySelector("[data-menu-show]");
      const menuDeleteBtn = transitionOverlay.querySelector("[data-menu-delete]");
      const backBtn = transitionOverlay.querySelector("[data-back-list]");
      const backMenuBtn = transitionOverlay.querySelector("[data-back-menu]");
      const formNode = transitionOverlay.querySelector("[data-event-form]");
      const formDateNumberNode = transitionOverlay.querySelector("[data-form-date-number]");
      const formWeekdayNode = transitionOverlay.querySelector("[data-form-weekday]");
      const formMonthNode = transitionOverlay.querySelector("[data-form-month]");
      const cancelFormBtn = transitionOverlay.querySelector("[data-cancel-form]");
      const detailTitleNode = transitionOverlay.querySelector("[data-detail-title]");
      const detailTimeNode = transitionOverlay.querySelector("[data-detail-time]");
      const detailLocationNode = transitionOverlay.querySelector("[data-detail-location]");
      const detailDescriptionNode = transitionOverlay.querySelector("[data-detail-description]");
      const timePickerNode = transitionOverlay.querySelector("[data-time-picker]");
      const timeHourTrackNode = transitionOverlay.querySelector("[data-time-hour-track]");
      const timeMinuteTrackNode = transitionOverlay.querySelector("[data-time-minute-track]");
      const timeWheelButtons = transitionOverlay.querySelectorAll("[data-time-wheel]");
      const ampmButtons = transitionOverlay.querySelectorAll("[data-ampm]");

      let resetTransitionTimeout;
      let pendingStartTimeout;
      let pendingActivationRaf;
      let pendingFocusTimeout;
      let modeTransitionMidTimeout;
      let modeTransitionEndTimeout;
      let lastFocusedElement = null;

      const wrapDay = (value, max) => ((value - 1 + max) % max) + 1;
      const pad2 = (value) => String(value).padStart(2, "0");
      const timeWheelState = {
        hour: { value: 9, count: 12, base: 12, index: 12 + 8, track: timeHourTrackNode },
        minute: { value: 0, count: 60, base: 60, index: 60, track: timeMinuteTrackNode },
      };
      let timeMeridiem = "AM";

      function buildTimeWheelTrack(trackNode, count, formatter) {
        trackNode.innerHTML = "";
        for (let i = 0; i < count * 3; i += 1) {
          const slot = document.createElement("span");
          slot.textContent = formatter(i % count);
          trackNode.append(slot);
        }
      }

      function syncTimeWheel(part, animate = true) {
        const wheel = timeWheelState[part];
        const previousTransition = wheel.track.style.transition;
        if (!animate) {
          wheel.track.style.transition = "none";
        }
        wheel.track.style.transform = `translateY(${-wheel.index * 24}px)`;
        if (!animate) {
          void wheel.track.offsetHeight;
          wheel.track.style.transition = previousTransition;
        }
      }

      function syncTimeValue() {
        const value = `${pad2(timeWheelState.hour.value)}:${pad2(timeWheelState.minute.value)} ${timeMeridiem}`;
        formNode.elements.time.value = value;
      }

      function spinTime(part, delta) {
        const wheel = timeWheelState[part];
        if (!delta) return;
        const minValue = part === "hour" ? 1 : 0;
        const maxValue = part === "hour" ? 12 : wheel.count - 1;
        if (delta > 0 && wheel.value === maxValue) {
          wheel.index = wheel.base + (wheel.count - 1);
          syncTimeWheel(part, false);
        } else if (delta < 0 && wheel.value === minValue) {
          wheel.index = wheel.base;
          syncTimeWheel(part, false);
        }
        if (part === "hour") {
          wheel.value = ((wheel.value - 1 + delta + 12) % 12) + 1;
        } else {
          wheel.value = (wheel.value + delta + wheel.count) % wheel.count;
        }
        wheel.index += delta;
        syncTimeWheel(part, true);
        syncTimeValue();
      }

      function setTimeFromString(value) {
        const match = /^(\d{1,2}):(\d{2})(?:\s*([AaPp][Mm]))?$/.exec((value || "").trim());
        let hour = match ? Number(match[1]) : 9;
        const minute = match ? Number(match[2]) : 0;
        const explicitMeridiem = match && match[3] ? match[3].toUpperCase() : null;
        if (explicitMeridiem) {
          timeMeridiem = explicitMeridiem;
          hour = Number.isFinite(hour) ? Math.max(1, Math.min(12, hour)) : 9;
        } else {
          const normalized = Number.isFinite(hour) ? Math.max(0, Math.min(23, hour)) : 9;
          timeMeridiem = normalized >= 12 ? "PM" : "AM";
          hour = normalized % 12;
          hour = hour === 0 ? 12 : hour;
        }
        timeWheelState.hour.value = hour;
        timeWheelState.minute.value = Number.isFinite(minute)
          ? Math.max(0, Math.min(59, minute))
          : 0;
        timeWheelState.hour.index = timeWheelState.hour.base + (timeWheelState.hour.value - 1);
        timeWheelState.minute.index = timeWheelState.minute.base + timeWheelState.minute.value;
        syncTimeWheel("hour", false);
        syncTimeWheel("minute", false);
        for (const button of ampmButtons) {
          button.classList.toggle("is-active", button.dataset.ampm === timeMeridiem);
        }
        syncTimeValue();
      }

      buildTimeWheelTrack(timeHourTrackNode, timeWheelState.hour.count, (value) => pad2(value + 1));
      buildTimeWheelTrack(timeMinuteTrackNode, timeWheelState.minute.count, (value) => pad2(value));
      setTimeFromString("09:00");

      for (const button of ampmButtons) {
        button.addEventListener("click", () => {
          timeMeridiem = button.dataset.ampm === "PM" ? "PM" : "AM";
          for (const item of ampmButtons) {
            item.classList.toggle("is-active", item === button);
          }
          syncTimeValue();
        });
      }

      for (const button of timeWheelButtons) {
        const part = button.dataset.timeWheel;
        if (!part || !(part in timeWheelState)) continue;

        button.addEventListener(
          "wheel",
          (event) => {
            event.preventDefault();
            if (event.deltaY === 0) return;
            spinTime(part, event.deltaY > 0 ? 1 : -1);
          },
          { passive: false },
        );

        button.addEventListener("keydown", (event) => {
          if (event.key === "ArrowDown") {
            event.preventDefault();
            spinTime(part, 1);
          } else if (event.key === "ArrowUp") {
            event.preventDefault();
            spinTime(part, -1);
          }
        });

        let dragPointerId = null;
        let dragLastY = 0;
        let dragAccumulator = 0;
        const dragStepPx = 10;

        const stopDrag = () => {
          dragPointerId = null;
          dragAccumulator = 0;
          button.classList.remove("is-dragging");
        };

        button.addEventListener("pointerdown", (event) => {
          if (event.button !== 0 && event.pointerType !== "touch") return;
          event.preventDefault();
          dragPointerId = event.pointerId;
          dragLastY = event.clientY;
          dragAccumulator = 0;
          button.classList.add("is-dragging");
          button.setPointerCapture(event.pointerId);
        });

        button.addEventListener("pointermove", (event) => {
          if (dragPointerId !== event.pointerId) return;
          event.preventDefault();
          const deltaY = event.clientY - dragLastY;
          dragLastY = event.clientY;
          dragAccumulator += deltaY;
          while (dragAccumulator >= dragStepPx) {
            spinTime(part, 1);
            dragAccumulator -= dragStepPx;
          }
          while (dragAccumulator <= -dragStepPx) {
            spinTime(part, -1);
            dragAccumulator += dragStepPx;
          }
        });

        button.addEventListener("pointerup", (event) => {
          if (dragPointerId !== event.pointerId) return;
          event.preventDefault();
          stopDrag();
        });
        button.addEventListener("pointercancel", stopDrag);
        button.addEventListener("lostpointercapture", stopDrag);
      }

      function loadEventStore() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
            return {};
          }
          return parsed;
        } catch {
          return {};
        }
      }

      function persistEventStore() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(eventStore));
          return true;
        } catch {
          return false;
        }
      }

      function buildDateKey(monthIndex, day) {
        const year = new Date().getFullYear();
        const mm = String(monthIndex + 1).padStart(2, "0");
        const dd = String(day).padStart(2, "0");
        return `${year}-${mm}-${dd}`;
      }

      function getEventsForCurrentDay() {
        const raw = eventStore[panelState.dateKey];
        if (!Array.isArray(raw)) return [];
        return raw
          .filter(
            (entry) =>
              entry &&
              typeof entry === "object" &&
              typeof entry.id === "string" &&
              typeof entry.title === "string" &&
              typeof entry.time === "string" &&
              typeof entry.description === "string" &&
              typeof entry.location === "string",
          )
          .map((entry) => ({ ...entry }));
      }

      function updateCurrentDayFromLine(line) {
        const state = dayState.get(line);
        if (!state) return;
        const monthIndex = state.monthIndex;
        const day = state.currentDay;
        const now = new Date().getFullYear();
        const date = new Date(now, monthIndex, day);
        panelState.line = line;
        panelState.monthIndex = monthIndex;
        panelState.day = day;
        panelState.dateKey = buildDateKey(monthIndex, day);
        const paddedDay = String(day).padStart(2, "0");
        const weekday = weekdayNames[date.getDay()];
        const month = monthNames[monthIndex];
        dateNumberNode.textContent = paddedDay;
        weekdayNode.textContent = weekday;
        monthNode.textContent = month;
        formDateNumberNode.textContent = paddedDay;
        formWeekdayNode.textContent = weekday;
        formMonthNode.textContent = month;
      }

      function setMode(mode) {
        panelState.mode = mode;
        const formMode = mode === "form-add" || mode === "form-edit";
        const browseMode = mode === "list" || mode === "detail";
        eventShell.classList.toggle("is-form-mode", formMode);
        menuViewNode.hidden = mode !== "menu";
        listViewNode.hidden = mode !== "list";
        detailViewNode.hidden = mode !== "detail";
        formNode.hidden = !formMode;
        backMenuBtn.hidden = !browseMode;
      }

      function transitionToMode(mode, { prepare, afterSet, onComplete } = {}) {
        window.clearTimeout(modeTransitionMidTimeout);
        window.clearTimeout(modeTransitionEndTimeout);
        eventShell.classList.remove("is-mode-transitioning");
        if (typeof prepare === "function") {
          prepare();
        }
        void eventShell.offsetHeight;
        eventShell.classList.add("is-mode-transitioning");
        modeTransitionMidTimeout = window.setTimeout(() => {
          setMode(mode);
          if (typeof afterSet === "function") {
            afterSet();
          }
        }, 110);
        modeTransitionEndTimeout = window.setTimeout(() => {
          eventShell.classList.remove("is-mode-transitioning");
          if (typeof onComplete === "function") {
            onComplete();
          }
        }, 230);
      }

      function renderEventList() {
        const events = getEventsForCurrentDay();
        eventShell.classList.toggle("is-delete-mode", panelState.deleteMode);
        descriptionNode.textContent = panelState.deleteMode
          ? "Select an event to delete."
          : "What needs to be done today.";
        emptyNode.textContent = panelState.deleteMode
          ? "No events to delete for this day."
          : "No events yet for this day.";
        eventListNode.innerHTML = "";
        if (events.length === 0) {
          emptyNode.hidden = false;
          if (panelState.mode === "detail") {
            setMode("list");
          }
          return;
        }

        emptyNode.hidden = true;

        for (const eventItem of events) {
          const li = document.createElement("li");
          li.className = "event-item";
          const button = document.createElement("button");
          button.type = "button";
          button.dataset.eventId = eventItem.id;
          const time = document.createElement("span");
          time.className = "event-item-time";
          time.textContent = eventItem.time;
          const title = document.createElement("span");
          title.className = "event-item-title";
          title.textContent = eventItem.title;
          const location = document.createElement("span");
          location.className = "event-item-location";
          location.textContent = eventItem.location;
          button.append(time, title, location);
          li.append(button);
          eventListNode.append(li);
        }
      }

      function removeCurrentEvent(eventId) {
        const events = getEventsForCurrentDay();
        const next = events.filter((entry) => entry.id !== eventId);
        eventStore[panelState.dateKey] = next;
        if (next.length === 0) {
          delete eventStore[panelState.dateKey];
        }
        return persistEventStore();
      }

      function renderDetail() {
        const events = getEventsForCurrentDay();
        const eventItem = events.find((eventEntry) => eventEntry.id === panelState.detailEventId);
        if (!eventItem) {
          panelState.detailEventId = null;
          setMode("list");
          renderEventList();
          return;
        }

        detailTitleNode.textContent = eventItem.title;
        detailTimeNode.textContent = eventItem.time;
        detailLocationNode.textContent = eventItem.location;
        detailDescriptionNode.textContent = eventItem.description;
      }

      function openForm(mode, eventItem, { animate = true } = {}) {
        panelState.editEventId = eventItem?.id || null;
        formNode.elements.title.value = eventItem?.title || "";
        formNode.elements.location.value = eventItem?.location || "";
        formNode.elements.description.value = eventItem?.description || "";
        setTimeFromString(eventItem?.time || "09:00");
        if (!animate) {
          setMode(mode);
          formNode.elements.title.focus();
          return;
        }
        transitionToMode(mode, {
          onComplete: () => {
            formNode.elements.title.focus();
          },
        });
      }

      function upsertCurrentEvent(payload) {
        const events = [...getEventsForCurrentDay()];
        if (panelState.editEventId) {
          const idx = events.findIndex((entry) => entry.id === panelState.editEventId);
          if (idx !== -1) {
            events[idx] = { ...events[idx], ...payload };
          }
        } else {
          events.push({
            id: `${Date.now().toString(36)}-${Math.random().toString(16).slice(2, 8)}`,
            ...payload,
          });
        }
        eventStore[panelState.dateKey] = events;
        return persistEventStore();
      }

      function refreshPanelContent() {
        renderEventList();
        if (panelState.mode === "detail") {
          renderDetail();
        }
      }

      const resetPanelTransition = ({ preserveFocus = false } = {}) => {
        window.clearTimeout(resetTransitionTimeout);
        window.clearTimeout(pendingStartTimeout);
        window.clearTimeout(pendingFocusTimeout);
        window.clearTimeout(modeTransitionMidTimeout);
        window.clearTimeout(modeTransitionEndTimeout);
        window.cancelAnimationFrame(pendingActivationRaf);
        eventShell.classList.remove("is-mode-transitioning");
        transitionPanel.classList.remove("is-settled");
        transitionOverlay.classList.remove("is-active");
        document.body.classList.remove("is-transitioning");
        transitionPanel.setAttribute("aria-hidden", "true");
        setMode("menu");
        if (!preserveFocus && lastFocusedElement && typeof lastFocusedElement.focus === "function") {
          lastFocusedElement.focus();
        }
        if (!preserveFocus) {
          lastFocusedElement = null;
        }
      };

      const startPanelTransition = (line) => {
        const wave = line.querySelector(".wave");
        if (!wave) return;

        updateCurrentDayFromLine(line);
        panelState.deleteMode = false;
        setMode("menu");
        panelState.detailEventId = null;
        panelState.editEventId = null;
        refreshPanelContent();

        const barRect = wave.getBoundingClientRect();
        const panelSize = Math.max(
          420,
          Math.min(Math.round(Math.min(window.innerWidth, window.innerHeight) * 0.78), 760),
        );

        transitionPanel.style.setProperty("--start-x", `${Math.round(barRect.right)}px`);
        transitionPanel.style.setProperty("--start-y", `${Math.round(barRect.bottom)}px`);
        transitionPanel.style.setProperty("--panel-size", `${panelSize}px`);

        lastFocusedElement = document.activeElement;
        resetPanelTransition({ preserveFocus: true });
        void transitionPanel.offsetHeight;

        pendingActivationRaf = requestAnimationFrame(() => {
          transitionPanel.setAttribute("aria-hidden", "false");
          transitionOverlay.classList.add("is-active");
          document.body.classList.add("is-transitioning");
          pendingFocusTimeout = window.setTimeout(() => {
            if (transitionOverlay.classList.contains("is-active")) {
              menuAddBtn.focus();
            }
          }, 620);
        });

        resetTransitionTimeout = window.setTimeout(() => {
          transitionPanel.classList.add("is-settled");
        }, 620);
      };

      for (const [monthIndex, line] of lines.entries()) {
        const input = line.querySelector('input[type="radio"]');
        const monthNode = line.querySelector(".month");
        const text = monthNode?.dataset.text || "";
        if (monthNode) {
          monthNode.innerHTML = [...text]
            .map(
              (ch, i) =>
                `<span style="--i:${i}">${ch === " " ? "&nbsp;" : ch}</span>`,
            )
            .join("");
        }

        const daysInMonth = monthLengths[monthIndex] ?? 30;
        const fullCycles = 2;
        const totalItems = daysInMonth * (fullCycles + 1);
        const itemHeight = 24;

        const dial = document.createElement("span");
        dial.className = "day-dial";
        dial.tabIndex = -1;
        dial.setAttribute("role", "spinbutton");

        const dialTrack = document.createElement("span");
        dialTrack.className = "dial-track";

        for (let i = 0; i < totalItems; i += 1) {
          const day = (i % daysInMonth) + 1;
          const slot = document.createElement("span");
          slot.textContent = String(day).padStart(2, "0");
          dialTrack.append(slot);
        }

        dial.append(dialTrack);
        if (monthNode) {
          monthNode.append(dial);
        }

        const selectTrigger = document.createElement("button");
        selectTrigger.type = "button";
        selectTrigger.className = "select-trigger";
        selectTrigger.setAttribute("aria-label", `Select ${text}`);
        selectTrigger.textContent = ">";
        monthNode?.append(selectTrigger);

        const revealDelayMs = 200 + Math.max(text.length - 1, 0) * 32 + 420 + 40;
        line.style.setProperty("--dial-delay", `${revealDelayMs}ms`);
        line.style.setProperty("--dial-spin-delay", `${revealDelayMs}ms`);

        const baseIndex = Math.floor((totalItems - daysInMonth) / 2);
        const state = {
          monthIndex,
          daysInMonth,
          itemHeight,
          currentDay: 1,
          currentIndex: baseIndex,
          revealDelayMs,
          dial,
          input,
          line,
          spinTimeout: undefined,
          delayTimeout: undefined,
        };
        dayState.set(line, state);

        const syncDial = (animate = true) => {
          const previousTransition = dialTrack.style.transition;
          if (!animate) {
            dialTrack.style.transition = "none";
          }
          line.style.setProperty(
            "--dial-stop",
            `${-state.currentIndex * state.itemHeight}px`,
          );
          dial.setAttribute("aria-valuemin", "1");
          dial.setAttribute("aria-valuemax", String(state.daysInMonth));
          dial.setAttribute("aria-valuenow", String(state.currentDay));
          dial.setAttribute("aria-valuetext", `Day ${state.currentDay}`);
          if (!animate) {
            void dialTrack.offsetHeight;
            dialTrack.style.transition = previousTransition;
          }
        };
        syncDial();

        const markTurning = () => {
          dial.classList.add("is-turning");
          window.clearTimeout(state.spinTimeout);
          state.spinTimeout = window.setTimeout(
            () => dial.classList.remove("is-turning"),
            120,
          );
        };

        const spinBy = (delta) => {
          if (!delta) return;
          if (input && !input.checked) {
            input.checked = true;
            input.dispatchEvent(new Event("change", { bubbles: true }));
          }

          line.style.setProperty("--dial-spin-delay", "0ms");

          if (delta > 0 && state.currentDay === state.daysInMonth) {
            state.currentIndex = baseIndex + (state.daysInMonth - 1);
            syncDial(false);
          } else if (delta < 0 && state.currentDay === 1) {
            state.currentIndex = baseIndex;
            syncDial(false);
          }

          state.currentDay = wrapDay(state.currentDay + delta, state.daysInMonth);
          state.currentIndex += delta;
          syncDial(true);
          markTurning();

          if (panelState.line === line && transitionOverlay.classList.contains("is-active")) {
            updateCurrentDayFromLine(line);
            refreshPanelContent();
          }
        };

        dial.addEventListener(
          "wheel",
          (event) => {
            event.preventDefault();
            if (event.deltaY === 0) return;
            const direction = event.deltaY > 0 ? 1 : -1;
            spinBy(direction);
          },
          { passive: false },
        );

        dial.addEventListener("keydown", (event) => {
          if (event.key === "ArrowDown") {
            event.preventDefault();
            spinBy(1);
          } else if (event.key === "ArrowUp") {
            event.preventDefault();
            spinBy(-1);
          }
        });

        let dragPointerId = null;
        let dragLastY = 0;
        let dragAccumulator = 0;
        const dragStepPx = 12;

        const stopDrag = () => {
          dragPointerId = null;
          dragAccumulator = 0;
          dial.classList.remove("is-dragging");
        };

        dial.addEventListener("pointerdown", (event) => {
          if (event.button !== 0 && event.pointerType !== "touch") return;
          event.preventDefault();
          if (input && !input.checked) {
            input.checked = true;
            input.dispatchEvent(new Event("change", { bubbles: true }));
          }
          dial.focus();
          dragPointerId = event.pointerId;
          dragLastY = event.clientY;
          dragAccumulator = 0;
          dial.classList.add("is-dragging");
          dial.setPointerCapture(event.pointerId);
        });

        dial.addEventListener("pointermove", (event) => {
          if (dragPointerId !== event.pointerId) return;
          event.preventDefault();
          const deltaY = event.clientY - dragLastY;
          dragLastY = event.clientY;
          dragAccumulator += deltaY;

          while (dragAccumulator >= dragStepPx) {
            spinBy(1);
            dragAccumulator -= dragStepPx;
          }
          while (dragAccumulator <= -dragStepPx) {
            spinBy(-1);
            dragAccumulator += dragStepPx;
          }
        });

        dial.addEventListener("pointerup", (event) => {
          if (dragPointerId !== event.pointerId) return;
          event.preventDefault();
          stopDrag();
        });
        dial.addEventListener("pointercancel", stopDrag);
        dial.addEventListener("lostpointercapture", stopDrag);

        selectTrigger.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          window.clearTimeout(pendingStartTimeout);

          const triggerTransition = () => {
            startPanelTransition(line);
          };

          if (input && !input.checked) {
            input.checked = true;
            input.dispatchEvent(new Event("change", { bubbles: true }));
            pendingStartTimeout = window.setTimeout(triggerTransition, 220);
          } else {
            triggerTransition();
          }
        });
      }

      for (const line of lines) {
        const input = line.querySelector('input[type="radio"]');
        const state = dayState.get(line);
        if (!input || !state) continue;
        input.addEventListener("change", () => {
          selectedLine = input.checked ? line : selectedLine;
          for (const candidate of lines) {
            const candidateInput = candidate.querySelector('input[type="radio"]');
            const candidateState = dayState.get(candidate);
            if (!candidateInput || !candidateState) continue;
            candidateState.dial.tabIndex = candidateInput.checked ? 0 : -1;
          }
          if (!input.checked) return;
          window.clearTimeout(state.delayTimeout);
          line.style.setProperty("--dial-spin-delay", `${state.revealDelayMs}ms`);
          state.delayTimeout = window.setTimeout(
            () => line.style.setProperty("--dial-spin-delay", "0ms"),
            state.revealDelayMs + 20,
          );
        });
      }

      eventListNode.addEventListener("click", (event) => {
        const trigger = event.target.closest("button[data-event-id]");
        if (!trigger) return;
        if (panelState.deleteMode) {
          const deleted = removeCurrentEvent(trigger.dataset.eventId);
          if (!deleted) return;
          panelState.detailEventId = null;
          setMode("list");
          refreshPanelContent();
          return;
        }
        panelState.detailEventId = trigger.dataset.eventId;
        setMode("detail");
        renderDetail();
      });

      backBtn.addEventListener("click", () => {
        transitionToMode("list", {
          prepare: () => {
            panelState.detailEventId = null;
          },
          afterSet: () => {
            refreshPanelContent();
          },
        });
      });

      backMenuBtn.addEventListener("click", () => {
        transitionToMode("menu", {
          prepare: () => {
            panelState.detailEventId = null;
            panelState.deleteMode = false;
          },
        });
      });

      menuAddBtn.addEventListener("click", () => {
        panelState.deleteMode = false;
        openForm("form-add", undefined, { animate: true });
      });

      menuShowBtn.addEventListener("click", () => {
        transitionToMode("list", {
          prepare: () => {
            panelState.deleteMode = false;
            panelState.detailEventId = null;
          },
          afterSet: () => {
            refreshPanelContent();
          },
        });
      });

      menuDeleteBtn.addEventListener("click", () => {
        transitionToMode("list", {
          prepare: () => {
            panelState.deleteMode = true;
            panelState.detailEventId = null;
          },
          afterSet: () => {
            refreshPanelContent();
          },
        });
      });

      cancelFormBtn.addEventListener("click", () => {
        panelState.editEventId = null;
        transitionToMode("menu");
      });

      formNode.addEventListener("submit", (event) => {
        event.preventDefault();
        const payload = {
          title: formNode.elements.title.value.trim(),
          time: formNode.elements.time.value.trim(),
          description: formNode.elements.description.value.trim(),
          location: formNode.elements.location.value.trim(),
        };
        if (!payload.title || !payload.time || !payload.description || !payload.location) return;
        const saved = upsertCurrentEvent(payload);
        if (!saved) return;
        panelState.deleteMode = false;
        panelState.editEventId = null;
        setMode("list");
        refreshPanelContent();
      });

      transitionPanel.addEventListener("click", (event) => {
        event.stopPropagation();
      });
      transitionOverlay.addEventListener("click", resetPanelTransition);
      document.addEventListener("keydown", (event) => {
        if (event.key === "Tab" && transitionOverlay.classList.contains("is-active")) {
          const focusables = [
            ...transitionPanel.querySelectorAll(
              'button:not([disabled]), input, textarea, [tabindex]:not([tabindex="-1"])',
            ),
          ].filter((node) => !node.hidden && node.offsetParent !== null);
          if (focusables.length > 0) {
            const first = focusables[0];
            const last = focusables[focusables.length - 1];
            if (event.shiftKey && document.activeElement === first) {
              event.preventDefault();
              last.focus();
            } else if (!event.shiftKey && document.activeElement === last) {
              event.preventDefault();
              first.focus();
            }
          }
        }
        if (event.key === "Escape") {
          resetPanelTransition();
        }
      });
      window.addEventListener("resize", () => {
        if (!transitionOverlay.classList.contains("is-active")) return;
        const selected = document.querySelector(".line:has(> input:checked)");
        if (selected) {
          startPanelTransition(selected);
        }
      });

      const customCaret = document.createElement("span");
      customCaret.className = "custom-caret";
      document.body.append(customCaret);

      const caretMirror = document.createElement("span");
      caretMirror.style.cssText =
        "position:fixed;top:-9999px;left:-9999px;white-space:pre;visibility:hidden;pointer-events:none;";
      document.body.append(caretMirror);

      function syncMirrorStyle(field) {
        const cs = window.getComputedStyle(field);
        caretMirror.style.font = cs.font;
        caretMirror.style.letterSpacing = cs.letterSpacing;
        caretMirror.style.textTransform = cs.textTransform;
        caretMirror.style.padding = "0";
        if (field.tagName === "TEXTAREA") {
          caretMirror.style.whiteSpace = "pre-wrap";
          caretMirror.style.wordBreak = "break-word";
          caretMirror.style.width = cs.width;
        } else {
          caretMirror.style.whiteSpace = "pre";
          caretMirror.style.width = "auto";
        }
      }

      function getCaretCoords(field) {
        const pos = field.selectionStart ?? 0;
        syncMirrorStyle(field);

        if (field.tagName === "TEXTAREA") {
          const before = field.value.substring(0, pos);
          caretMirror.textContent = before;
          const probe = document.createElement("span");
          probe.textContent = "\u200b";
          caretMirror.append(probe);
          const rect = probe.getBoundingClientRect();
          probe.remove();
          const fieldRect = field.getBoundingClientRect();
          return {
            x: fieldRect.left + (rect.left - caretMirror.getBoundingClientRect().left),
            y: fieldRect.top + (rect.top - caretMirror.getBoundingClientRect().top) + rect.height * 0.5,
          };
        }

        const before = field.value.substring(0, pos);
        caretMirror.textContent = before || "\u200b";
        const mirrorRect = caretMirror.getBoundingClientRect();
        const textWidth = before ? mirrorRect.width : 0;
        const fieldRect = field.getBoundingClientRect();
        const cs = window.getComputedStyle(field);
        const padLeft = parseFloat(cs.paddingLeft) || 0;
        return {
          x: fieldRect.left + padLeft + textWidth - field.scrollLeft,
          y: fieldRect.top + fieldRect.height * 0.5,
        };
      }

      function updateCaretPosition(field) {
        const coords = getCaretCoords(field);
        customCaret.style.left = `${coords.x + 6}px`;
        customCaret.style.top = `${coords.y}px`;
      }

      let caretRafId = null;
      function scheduleCaretUpdate(field) {
        if (caretRafId) cancelAnimationFrame(caretRafId);
        caretRafId = requestAnimationFrame(() => {
          caretRafId = null;
          updateCaretPosition(field);
        });
      }

      const caretFields = formNode.querySelectorAll(
        'input:not([type="hidden"]), textarea',
      );

      for (const field of caretFields) {
        field.addEventListener("focus", () => {
          customCaret.classList.add("is-visible");
          scheduleCaretUpdate(field);
        });
        field.addEventListener("blur", () => {
          customCaret.classList.remove("is-visible");
        });
        field.addEventListener("input", () => scheduleCaretUpdate(field));
        field.addEventListener("click", () => scheduleCaretUpdate(field));
        field.addEventListener("keyup", () => scheduleCaretUpdate(field));
        field.addEventListener("keydown", () => scheduleCaretUpdate(field));
      }

      document.addEventListener("selectionchange", () => {
        const active = document.activeElement;
        if (active && active.closest && active.closest("[data-event-form]")) {
          scheduleCaretUpdate(active);
        }
      });
    </script>
  </body>
</html>
